<!DOCTYPE html>
<html>
<body>
<h1>Testing Saved Quizzes</h1>
<script>
    // mock behavior similar to SavedQuizzes.tsx
    let isSyncing = false;
    let quizzes = [];

    const db = {
        getQuizzes: async () => {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve(window.__mockQuizzes || []);
                }, 50);
            });
        }
    };

    const loadQuizzes = async () => {
        const data = await db.getQuizzes();
        quizzes = data;
        console.log("Quizzes loaded:", quizzes.length);
        render();
    };

    const handleSyncComplete = async () => {
        console.log("Sync complete handler started");
        await loadQuizzes();
        isSyncing = false;
        console.log("Sync complete handler finished, isSyncing:", isSyncing);
        render();
    };

    window.addEventListener('mindflow-sync-complete', handleSyncComplete);

    function render() {
        if (isSyncing) document.body.innerHTML = "<h1>Loading...</h1>";
        else if (quizzes.length === 0) document.body.innerHTML = "<h1>Empty State</h1>";
        else document.body.innerHTML = "<h1>Quizzes: " + quizzes.map(q => q.name).join(', ') + "</h1>";
    }

    // Initial
    loadQuizzes();

    // Simulate sync
    setTimeout(() => {
        isSyncing = true;
        render();

        // Simulate data arriving in DB
        setTimeout(() => {
            window.__mockQuizzes = [{ name: 'Test 1' }, { name: 'Test 2' }];
            window.dispatchEvent(new Event('mindflow-sync-complete'));
        }, 500);

    }, 500);

</script>
</body>
</html>
